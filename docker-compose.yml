# Docker Compose для AI Telegram Bot
# Запускает бота и PostgreSQL базу данных

version: '3.8'

services:
  # === PostgreSQL Database ===
  db:
    image: postgres:15-alpine
    container_name: ai_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ai_bot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_bot_network

  # === AI Telegram Bot ===
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Telegram
      TOKEN: ${TOKEN}
      # Database
      DB_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-ai_bot_db}
      # AI API
      IOINTELLIGENCE_API_KEY: ${IOINTELLIGENCE_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.example.com/v1}
      # Settings
      SUMMARIZER_MODEL: ${SUMMARIZER_MODEL:-mistralai/Magistral-Small-2506}
      SUMMARY_THRESHOLD_CHARS: ${SUMMARY_THRESHOLD_CHARS:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: /app/logs/bot.log
    volumes:
      - bot_logs:/app/logs
      - bot_usage:/app/ai_model_usage.json
    networks:
      - ai_bot_network
    # Раскомментируйте для отладки
    # stdin_open: true
    # tty: true

volumes:
  postgres_data:
    driver: local
  bot_logs:
    driver: local
  bot_usage:
    driver: local

networks:
  ai_bot_network:
    driver: bridge
